syntax = "proto3";

option java_multiple_files = true;
option java_package = "edu.eci.arsw.wellness.medical";
option java_outer_classname = "MedicalProto";

service MedicalService {
  rpc GetSpecialties (EmptyMedicalRequest) returns (SpecialtyList);
}

message EmptyMedicalRequest {}

message Specialty {
  string name = 1;
  string description = 2;
}

message SpecialtyList {
  repeated Specialty specialties = 1;
}
